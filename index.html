<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GeoSceneOnline 地摊经济城市分布地图</title>
    <!-- ArcGIS JS API 5.0 官方CDN -->
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/5.0/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        /* 1.页眉区域 */
        .header {
            width: 100%;
            height: 65px;
            background: linear-gradient(135deg, #006699, #004466);
            color: #fff;
            line-height: 65px;
            padding: 0 30px;
            font-size: 24px;
            font-weight: 600;
            box-shadow: 0 2px 10px #ccc;
        }
        /* 主体容器：地图 + 底图库侧边栏 */
        .container {
            display: flex;
            height: calc(100vh - 65px);
        }
        /* 2.地图主区域 */
        #mapView {
            flex: 1;
            width: 100%;
            height: 100%;
        }
        /* 3.右侧底图库区域 */
        .sidebar {
            width: 280px;
            background-color: #f8f9fa;
            border-left: 1px solid #e5e7eb;
            padding: 20px 15px;
            overflow-y: auto;
        }
        .sidebar h3 {
            color: #006699;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 4px solid #006699;
        }
        .base-item {
            background: #fff;
            padding: 10px 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: 0.3s;
        }
        .base-item:hover {
            background: #e6f4ff;
            border-color: #006699;
        }
        /* 微件位置美化固定 */
        .esri-search {top:20px;left:20px;width:330px;}
        .esri-layer-list {top:20px;right:20px;width:260px;}
        .esri-legend {bottom:90px;left:20px;width:260px;}
        .esri-scale-bar {bottom:25px;left:20px;}
    </style>
</head>
<body>
    <!-- 页眉区域 -->
    <div class="header">GeoSceneOnline 地摊经济城市空间分布地图系统</div>

    <!-- 主体：地图区域 + 底图库区域 -->
    <div class="container">
        <div id="mapView"></div>
        <div class="sidebar">
            <h3>底图切换</h3>
            <div class="base-item" data-map="streets">标准街道底图</div>
            <div class="base-item" data-map="satellite">卫星影像底图</div>
            <div class="base-item" data-map="topographic">地形图</div>
            <div class="base-item" data-map="gray">灰色极简底图</div>
            <div class="base-item" data-map="oceans">海洋底图</div>
        </div>
    </div>

    <script>
        require([
            "esri/Map",
            "esri/views/MapView",
            "esri/layers/FeatureLayer",
            "esri/widgets/Search",
            "esri/widgets/Legend",
            "esri/widgets/ScaleBar",
            "esri/widgets/LayerList"
        ],function(Map,MapView,FeatureLayer,Search,Legend,ScaleBar,LayerList){
            // 初始化地图
            const map = new Map({
                basemap:"streets"
            });

            // 地图视图
            const view = new MapView({
                container:"mapView",
                map:map,
                center:[105,36], // 全国居中
                zoom:4
            });

            // 加载你指定的 GeoSceneOnline 地摊经济专题图层
            const dtLayer = new FeatureLayer({
                url:"https://www.geosceneonline.cn/server/rest/services/Hosted/全国开展“地摊经济”的城市空间分布/FeatureServer/0",
                title:"全国地摊经济分布城市",
                visible:true
            });
            map.add(dtLayer);

            // 1.搜索框微件
            const search = new Search({view:view});
            view.ui.add(search,"top-left");

            // 2.图例微件
            const legend = new Legend({view:view});
            view.ui.add(legend,"bottom-left");

            // 3.比例尺微件
            const scaleBar = new ScaleBar({
                view:view,
                unit:"metric"
            });
            view.ui.add(scaleBar,"bottom-left");

            // 4.图层列表/图层控制微件
            const layerList = new LayerList({view:view});
            view.ui.add(layerList,"top-right");

            // 右侧底图切换功能
            document.querySelectorAll(".base-item").forEach(item=>{
                item.onclick = function(){
                    map.basemap = this.dataset.map;
                }
            });
        })
    </script>
</body>
</html>
